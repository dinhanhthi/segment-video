name: Build Extension ZIP

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-extension-zip:
    name: Build extension ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read extension version
        id: version
        run: |
          VERSION=$(python -c "import json; print(json.load(open('manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extension version: $VERSION (tag: v$VERSION)"

      - name: Validate manifest
        run: python -m json.tool manifest.json > /dev/null

      - name: Verify extension files
        run: |
          test -f manifest.json
          test -f content.js
          test -f styles.css
          test -f icons/icon-16.png
          test -f icons/icon-48.png
          test -f icons/icon-128.png

      - name: Build ZIP
        run: |
          rm -rf dist
          mkdir -p dist/segment-videos/icons

          cp manifest.json dist/segment-videos/
          cp content.js dist/segment-videos/
          cp styles.css dist/segment-videos/
          cp icons/icon-16.png dist/segment-videos/icons/
          cp icons/icon-48.png dist/segment-videos/icons/
          cp icons/icon-128.png dist/segment-videos/icons/

          cd dist
          zip -r "segment-videos-${{ steps.version.outputs.version }}.zip" segment-videos
          ln -sf "segment-videos-${{ steps.version.outputs.version }}.zip" segment-videos.zip

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: segment-videos-${{ steps.version.outputs.version }}
          path: dist/segment-videos.zip
          if-no-files-found: error

      - name: Check whether release tag already exists
        id: tag_check
        if: github.event_name != 'pull_request'
        run: |
          git fetch --tags origin
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release tag ${{ steps.version.outputs.tag }} already exists; skipping release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: github.event_name != 'pull_request' && steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: dist/segment-videos-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
